<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Proposal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Base Reset and Styling */
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      background: #0b0f19 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
      overflow: hidden !important;
      color: #f1f5f9 !important;
      box-sizing: border-box !important;
    }
    *, *:before, *:after {
      box-sizing: inherit !important;
    }

    /* 3-Layer Sticky Header Banner */
    .ls-proposal-banner {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 140px !important;
      background: #0b0f19 !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
      display: flex !important;
      flex-direction: column !important;
      z-index: 2147483647 !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important;
    }

    #ls-viewport-container {
      margin-top: 140px !important;
      width: 100% !important;
      height: calc(100vh - 140px) !important;
      overflow: auto !important;
      background: #090d16 !important;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      transition: all 0.3s ease !important;
      padding: 0 !important;
      scrollbar-width: none !important;
      -ms-overflow-style: none !important;
    }
    #ls-viewport-container::-webkit-scrollbar {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
    }

    /* TOP LAYER: Marquee styling */
    .ls-marquee-wrapper {
      background: linear-gradient(90deg, #d31a1a 0%, #f97316 100%) !important;
      height: 28px !important;
      display: flex !important;
      align-items: center !important;
      overflow: hidden !important;
      width: 100% !important;
    }
    .ls-marquee-content {
      display: inline-block !important;
      white-space: nowrap !important;
      animation: ls_marquee 25s linear infinite !important;
      color: #ffffff !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      letter-spacing: 0.5px !important;
      padding-left: 100% !important;
    }
    @keyframes ls_marquee {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-100%, 0, 0); }
    }

    /* MIDDLE LAYER styling */
    .ls-middle-layer {
      height: 50px !important;
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      padding: 0 24px !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
      background: #131b2e !important;
    }
    .ls-countdown-box {
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
    }
    .ls-timer-label {
      font-size: 12px !important;
      color: #94a3b8 !important;
      font-weight: 500 !important;
    }
    .ls-timer-clock {
      font-family: 'Courier New', Courier, monospace !important;
      font-size: 18px !important;
      font-weight: 800 !important;
      color: #f97316 !important;
      text-shadow: 0 0 10px rgba(249, 115, 22, 0.3) !important;
    }
    .ls-welcome-box {
      font-size: 13px !important;
      color: #e2e8f0 !important;
    }
    .ls-highlight-name {
      color: #00d9f5 !important;
      text-shadow: 0 0 8px rgba(0, 217, 245, 0.2) !important;
    }

    /* Central Device Switcher buttons */
    .ls-banner-devices {
      display: flex !important;
      align-items: center !important;
      background: rgba(255, 255, 255, 0.04) !important;
      padding: 3px !important;
      border-radius: 9999px !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      gap: 2px !important;
    }
    .ls-device-btn {
      background: none !important;
      border: none !important;
      color: #64748b !important;
      padding: 4px 12px !important;
      border-radius: 9999px !important;
      cursor: pointer !important;
      transition: all 0.2s ease !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      outline: none !important;
    }
    .ls-device-btn:hover {
      color: #cbd5e1 !important;
      background: rgba(255, 255, 255, 0.03) !important;
    }
    .ls-device-btn.active {
      background: #00d9f5 !important;
      color: #0f172a !important;
      font-weight: 700 !important;
      box-shadow: 0 2px 8px rgba(0, 217, 245, 0.3) !important;
    }
    .ls-device-btn svg {
      width: 14px !important;
      height: 14px !important;
      fill: currentColor !important;
    }

    /* BOTTOM LAYER: Buttons container */
    .ls-bottom-layer {
      height: 62px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      padding: 0 24px !important;
      background: #0b0f19 !important;
    }
    .ls-buttons-container {
      display: flex !important;
      gap: 12px !important;
      width: 100% !important;
      max-width: 900px !important;
      justify-content: center !important;
    }
    .ls-btn-container-sub {
      display: contents !important;
    }

    /* BUTTONS styling */
    .ls-btn-action {
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 8px !important;
      padding: 10px 24px !important;
      border-radius: 9999px !important;
      font-size: 13px !important;
      font-weight: 800 !important;
      text-decoration: none !important;
      cursor: pointer !important;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
      white-space: nowrap !important;
      letter-spacing: 0.5px !important;
    }
    .ls-btn-action:hover {
      transform: translateY(-2px) !important;
    }
    .ls-btn-action:active {
      transform: translateY(-0.5px) !important;
    }

    /* WhatsApp Button styling (Heartbeat Scale + Notification Badge) */
    .ls-btn-wa-pulse {
      background: #25d366 !important;
      color: #ffffff !important;
      animation: ls_wa_heartbeat 1.8s infinite ease-in-out !important;
      flex: 1.4 !important;
      max-width: 320px !important;
      position: relative !important;
      overflow: visible !important;
    }
    
    .ls-btn-wa-pulse i,
    .ls-btn-wa-pulse .ls-btn-txt {
      position: relative !important;
      z-index: 2 !important;
    }

    .ls-btn-wa-pulse:hover {
      animation: none !important;
      transform: scale(1.05) translateY(-2px) !important;
      background: #20ba5a !important;
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4) !important;
    }
    
    /* Red Notification Badge */
    .ls-btn-badge-notif {
      position: absolute !important;
      top: -6px !important;
      right: -6px !important;
      background: #ef4444 !important;
      color: #ffffff !important;
      font-size: 10px !important;
      font-weight: 900 !important;
      width: 18px !important;
      height: 18px !important;
      border-radius: 50% !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5) !important;
      border: 1.5px solid #0f172a !important;
      z-index: 10 !important;
      animation: ls_badge_wiggle 2.5s infinite ease-in-out !important;
    }

    @keyframes ls_wa_heartbeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.05); }
      40% { transform: scale(1.02); }
      55% { transform: scale(1.06); }
    }

    @keyframes ls_badge_wiggle {
      0%, 80%, 100% { transform: scale(1) rotate(0deg); }
      83% { transform: scale(1.25) rotate(15deg); }
      86% { transform: scale(1.25) rotate(-15deg); }
      89% { transform: scale(1.25) rotate(15deg); }
      92% { transform: scale(1.25) rotate(-15deg); }
      95% { transform: scale(1.1) rotate(0deg); }
    }

    /* Email button */
    .ls-btn-email-glow {
      background: transparent !important;
      color: #ffffff !important;
      border: 2px solid #00d9f5 !important;
      box-shadow: 0 0 8px rgba(0, 217, 245, 0.1) !important;
      flex: 1 !important;
      max-width: 200px !important;
    }
    .ls-btn-email-glow:hover {
      background: rgba(0, 217, 245, 0.1) !important;
      box-shadow: 0 0 15px rgba(0, 217, 245, 0.3) !important;
    }

    /* Fiverr button */
    .ls-btn-fiv-glow {
      background: transparent !important;
      color: #ffffff !important;
      border: 2px solid #f59e0b !important;
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.1) !important;
      animation: ls_wa_heartbeat 1.8s infinite ease-in-out !important;
      animation-delay: 0.3s !important;
      flex: 1 !important;
      max-width: 200px !important;
      position: relative !important;
      overflow: visible !important;
    }
    .ls-btn-fiv-glow i,
    .ls-btn-fiv-glow .ls-btn-txt {
      position: relative !important;
      z-index: 2 !important;
    }
    .ls-btn-fiv-glow:hover {
      animation: none !important;
      transform: scale(1.05) translateY(-2px) !important;
      background: rgba(245, 158, 11, 0.1) !important;
      box-shadow: 0 0 15px rgba(245, 158, 11, 0.3) !important;
    }

    /* Viewport screens iframe bezels */
    #ls-viewport-screen {
      width: 100% !important;
      height: 100% !important;
      background: #ffffff !important;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
      margin: 0 auto !important;
      position: relative !important;
      display: flex !important;
    }
    iframe {
      width: 1px !important;
      min-width: 100% !important;
      height: 100% !important;
      border: none !important;
      background: #ffffff !important;
    }

    body.device-mobile #ls-viewport-container {
      padding: 40px 10px !important;
      align-items: flex-start !important;
    }
    body.device-mobile #ls-viewport-screen {
      box-sizing: content-box !important;
      width: 375px !important;
      height: 812px !important;
      min-height: 812px !important;
      max-height: 812px !important;
      border: 12px solid #1e293b !important;
      border-radius: 40px !important;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8) !important;
      overflow: hidden !important;
    }
    body.device-mobile #ls-viewport-screen::before {
      content: "" !important;
      position: absolute !important;
      top: -1px !important;
      left: 50% !important;
      transform: translateX(-50%) !important;
      width: 140px !important;
      height: 24px !important;
      background: #1e293b !important;
      border-bottom-left-radius: 16px !important;
      border-bottom-right-radius: 16px !important;
      z-index: 999999 !important;
      pointer-events: none !important;
    }

    body.device-tablet #ls-viewport-container {
      padding: 40px 10px !important;
      align-items: flex-start !important;
    }
    body.device-tablet #ls-viewport-screen {
      box-sizing: content-box !important;
      width: 768px !important;
      height: 1024px !important;
      min-height: 1024px !important;
      max-height: 1024px !important;
      border: 16px solid #1e293b !important;
      border-radius: 28px !important;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8) !important;
      overflow: hidden !important;
    }

    /* Small Screen adaptations (Mobiles & Tablets under 768px) */
    @media (max-width: 768px) {
      .ls-proposal-banner {
        height: 172px !important;
      }
      #ls-viewport-container {
        margin-top: 172px !important;
        height: calc(100vh - 172px) !important;
      }
      .ls-middle-layer {
        height: 44px !important;
        padding: 0 12px !important;
      }
      .ls-welcome-box {
        display: none !important;
      }
      .ls-countdown-box {
        flex: 1 !important;
        justify-content: center !important;
      }
      .ls-banner-devices {
        display: none !important;
      }
      .ls-bottom-layer {
        height: 100px !important;
        padding: 10px 12px !important;
      }
      .ls-buttons-container {
        flex-direction: column !important;
        gap: 8px !important;
        width: 100% !important;
      }
      .ls-btn-container-sub {
        display: flex !important;
        gap: 8px !important;
        width: 100% !important;
      }
      .ls-btn-action {
        width: 100% !important;
        max-width: none !important;
        padding: 12px 16px !important;
        font-size: 11px !important;
        border-radius: 8px !important;
      }
      .ls-btn-wa-pulse {
        flex: none !important;
        animation: none !important;
        background: #25d366 !important;
      }
      .ls-btn-fiv-glow {
        animation: none !important;
        flex: 1 !important;
      }
      .ls-btn-email-glow {
        flex: 1 !important;
      }
    }
  </style>
</head>
<body class="device-desktop">

  <!-- Fixed Proposal Banner overlay -->
  <div class="ls-proposal-banner">
    <!-- TOP LAYER: Scrolling marquee -->
    <div class="ls-marquee-wrapper">
      <div class="ls-marquee-content">
        <span>📉 80% of customers search online first · Don't lose them to competitors who have a website · 📉 80% of customers search online first · Don't lose them to competitors who have a website</span>
      </div>
    </div>
    
    <!-- MIDDLE LAYER: countdown and personalized message -->
    <div class="ls-middle-layer">
      <div class="ls-countdown-box">
        <span class="ls-timer-label">⏳ Offer expires in:</span>
        <span class="ls-timer-clock" id="ls-countdown-clock">23:59:59</span>
      </div>
      
      <!-- Central Device Switcher buttons -->
      <div class="ls-banner-devices">
        <button class="ls-device-btn active" id="btn-view-desktop" title="Desktop View">
          <svg viewBox="0 0 576 512"><path d="M64 0C28.7 0 0 28.7 0 64V352c0 35.3 28.7 64 64 64H240l-10.7 32H160c-17.7 0-32 14.3-32 32s14.3 32 32 32H416c17.7 0 32-14.3 32-32s-14.3-32-32-32H346.7L336 416H512c35.3 0 64-28.7 64-64V64c0-35.3-28.7-64-64-64H64zM512 64V288H64V64H512z"/></svg>
        </button>
        <button class="ls-device-btn" id="btn-view-tablet" title="Tablet View">
          <svg viewBox="0 0 448 512"><path d="M64 0C28.7 0 0 28.7 0 64V448c0 35.3 28.7 64 64 64H384c35.3 0 64-28.7 64-64V64c0-35.3-28.7-64-64-64H64zM256 464c-17.7 0-32-14.3-32-32s14.3-32 32-32s32 14.3 32 32s-14.3 32-32 32zM384 64V384H64V64H384z"/></svg>
        </button>
        <button class="ls-device-btn" id="btn-view-mobile" title="Mobile View">
          <svg viewBox="0 0 384 512"><path d="M80 0C44.7 0 16 28.7 16 64V448c0 35.3 28.7 64 64 64H304c35.3 0 64-28.7 64-64V64c0-35.3-28.7-64-64-64H80zM192 464c-17.7 0-32-14.3-32-32s14.3-32 32-32s32 14.3 32 32s-14.3 32-32 32zM320 64V384H64V64H320z"/></svg>
        </button>
      </div>

      <div class="ls-welcome-box">
        <span>👋 Built exclusively for <strong class="ls-highlight-name" id="ls-brand-name">Business Name</strong></span>
      </div>
    </div>

    <!-- BOTTOM LAYER: Contact / Order Buttons -->
    <div class="ls-bottom-layer">
      <div class="ls-buttons-container">
        <!-- WhatsApp -->
        <a href="#" target="_blank" class="ls-btn-action ls-btn-wa-pulse" id="ls-whatsapp-lnk">
          <i class="fa-brands fa-whatsapp"></i> <span class="ls-btn-txt">MESSAGE ON WHATSAPP</span>
          <div class="ls-btn-badge-notif">1</div>
        </a>
        <div class="ls-btn-container-sub">
          <!-- Email -->
          <a href="#" target="_blank" class="ls-btn-action ls-btn-email-glow" id="ls-email-lnk">
            <i class="fa-solid fa-envelope"></i> <span class="ls-btn-txt">EMAIL US</span>
          </a>
          <!-- Fiverr -->
          <a href="#" target="_blank" class="ls-btn-action ls-btn-fiv-glow" id="ls-fiverr-lnk">
            <i class="fa-solid fa-cart-shopping"></i> <span class="ls-btn-txt">ORDER ON FIVERR</span>
            <div class="ls-btn-badge-notif" style="animation-delay: 0.5s !important;">1</div>
          </a>
        </div>
      </div>
    </div>
  </div>
  <!-- Inner Iframe Viewer screen -->
  <div id="ls-viewport-container">
    <div id="ls-viewport-screen">
      <iframe id="ls-proposal-iframe" src=""></iframe>
    </div>
  </div>


  <!-- Viewport Switch Controller Script -->
  <script>
      const GITHUB_REPO_PATH = "pms5566/leadscope";

      (async function() {
        // 1. Read Query Parameters
        const urlParams = new URLSearchParams(window.location.search);
        
        // 🔗 Resolve ?mockup=alias client-side from GitHub leads_db.json
        let goAlias = urlParams.get('mockup') || urlParams.get('go');
        if (!goAlias) {
          const pathParts = window.location.pathname.split('/').filter(Boolean);
          if (pathParts.length === 1 && !pathParts[0].includes('.')) {
            goAlias = pathParts[0];
          }
        }
        if (goAlias) {
          try {
            document.body.innerHTML = `
              <div style="background-color: #0b0f19; color: #f1f5f9; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">
                <div style="font-size: 2rem; color: #00f2fe; margin-bottom: 1rem;"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
                <h2 style="font-size: 1.1rem; font-weight: bold; margin-bottom: 0.25rem;">Personalizing Demo...</h2>
                <p style="color: #64748b; font-size: 0.8rem;">Connecting securely to LeadScope cloud...</p>
              </div>
            `;
            
            let dbRes;
            try {
              // Try the uncached real-time proxy first
              dbRes = await fetch(`https://raw.githack.com/${GITHUB_REPO_PATH}/main/leads_db.json`);
              if (!dbRes.ok) throw new Error();
            } catch (e) {
              // Fallback to the official raw CDN (might contain up to 5 mins of caching)
              dbRes = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO_PATH}/main/leads_db.json?t=${Date.now()}`);
              if (!dbRes.ok) throw new Error('Database fetch failed');
            }
            const db = await dbRes.json();
            
            let targetUrl = db.shortLinks ? db.shortLinks[goAlias] : null;
            if (!targetUrl && db.leads) {
              const leadObj = db.leads.find(l => l.shortAlias === goAlias || l.id === goAlias);
              if (leadObj) {
                const cleanNiche = (leadObj.niche || 'cafe').toLowerCase().trim().replace(/[^a-z0-9_-]/g, '-').replace(/-+/g, '-');
                const tNiche = leadObj.portfolioLink || cleanNiche;
                const trackingUrl = db.settings?.localTrackingUrl || '';
                targetUrl = `/?niche=${tNiche}&leadId=${leadObj.id}&name=${encodeURIComponent(leadObj.name)}&phone=${encodeURIComponent(leadObj.phone || '')}&address=${encodeURIComponent(leadObj.address || '')}&trackUrl=${encodeURIComponent(trackingUrl)}`;
              }
            }

            if (targetUrl) {
              const urlObj = new URL(targetUrl, window.location.origin);
              // Extract niche and leadId from pathname if they are in /preview/:niche/:leadId format
              const pathParts = urlObj.pathname.split('/').filter(Boolean);
              if (pathParts[0] === 'preview' && pathParts[1] && pathParts[2]) {
                urlObj.searchParams.set('niche', pathParts[1]);
                urlObj.searchParams.set('leadId', pathParts[2]);
              }
              // ✅ Redirect to root '/' so Vercel does NOT re-match the /:alias rewrite rule
              window.location.replace(window.location.origin + '/' + urlObj.search);
              return;
            } else {
              document.body.innerHTML = `
                <div style="background-color: #0b0f19; color: #f1f5f9; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">
                  <div style="background-color: #131b2e; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 2.5rem; max-width: 440px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6);">
                    <div style="font-size: 3rem; color: #ef4444; margin-bottom: 1.5rem;"><i class="fa-solid fa-circle-xmark"></i></div>
                    <h1 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem;">Demo Not Found</h1>
                    <p style="color: #94a3b8; font-size: 0.95rem; line-height: 1.5;">This customized proposal has expired or is unavailable.</p>
                  </div>
                </div>
              `;
              return;
            }
          } catch (err) {
            console.error('[Alias Lookup Error]', err);
          }
        }

        const niche = urlParams.get('niche') || 'SPA';
        const leadId = urlParams.get('leadId') || 'test-lead';
        const businessName = urlParams.get('name') || 'Our Premium Business';
        const phone = urlParams.get('phone') || 'Contact Us';
        const address = urlParams.get('address') || 'Our Location';
        const trackingUrlStr = urlParams.get('trackUrl') || '';

        // 🔐 Check Active/Locked Status dynamically if trackUrl is set
        if (trackingUrlStr) {
          try {
            const checkUrl = trackingUrlStr.replace(/\/$/, '') + '/api/crm/status/' + encodeURIComponent(leadId);
            const statusRes = await fetch(checkUrl);
            if (statusRes.ok) {
              const statusData = await statusRes.json();
              if (statusData.active === false) {
                // Render Locked Access Screen inside parent document
                document.body.innerHTML = `
                  <div style="background-color: #0b0f19; color: #f1f5f9; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">
                    <div style="background-color: #131b2e; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 2.5rem; max-width: 440px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6);">
                      <div style="font-size: 3rem; color: #ef4444; margin-bottom: 1.5rem;"><i class="fa-solid fa-lock"></i></div>
                      <h1 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem;">Proposal Private</h1>
                      <p style="color: #94a3b8; font-size: 0.95rem; line-height: 1.5; margin-bottom: 2rem;">This customized design mockup built for <strong>\${escapeHtml(businessName)}</strong> is currently locked or private. If you are the owner, you can request instant activation by clicking below.</p>
                      <button id="btn-request-access" style="background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #0b0f19; border: none; padding: 12px 28px; font-weight: bold; font-size: 0.95rem; border-radius: 9999px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px;"><i class="fa-solid fa-key"></i> Request Access</button>

          const clock = document.getElementById('ls-countdown-clock');

          let hours = 23;
          let minutes = 59;
          let seconds = 59;
          
          function updateClock() {
            seconds--;
            if (seconds < 0) {
              seconds = 59;
              minutes--;
              if (minutes < 0) {
                minutes = 59;
                hours--;
                if (hours < 0) {
                  hours = 23;
                  minutes = 59;
                  seconds = 59;
                }

            }
            clock.textContent = String(hours).padStart(2, '0') + " : " + String(minutes).padStart(2, '0') + " : " + String(seconds).padStart(2, '0');

                const realName = ${JSON.stringify(businessName)};

                }
              })();
            <\/script>
          `;

            <script>
              (function() {
                const leadId = ${JSON.stringify(leadId)};
                const leadName = ${JSON.stringify(businessName + ' (' + niche + ')')};
                const device = /Mobi|Android|iPhone/i.test(navigator.userAgent) ? 'mobile' : 'desktop';

                  try {
                    const url = trackingUrl ? (trackingUrl.replace(/\\/$/, '') + '/api/track') : '/api/track';
                    await fetch(url, {
                      method: 'POST',
                      headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                      },
                      body: JSON.stringify({ leadId, leadName, event, details: { device, ...details } })
                    });
                  } catch (err) {}
                }

                let totalSeconds = 0;
                let maxScroll = 0;
                
                window.addEventListener('scroll', (e) => {
                  let scrollTop = window.scrollY || document.documentElement.scrollTop;
                  let scrollHeight = document.documentElement.scrollHeight;
                  let clientHeight = document.documentElement.clientHeight;
                  
                  if (e.target && e.target !== document && e.target !== window) {
                    scrollTop = e.target.scrollTop;
                    scrollHeight = e.target.scrollHeight;
                    clientHeight = e.target.clientHeight;
                  }
                  
                  const denom = scrollHeight - clientHeight;
                  const scrollPercent = denom > 0 ? Math.round((scrollTop / denom) * 100) : 0;
                  if (scrollPercent > maxScroll) {
                    maxScroll = scrollPercent;
                  }
                }, true);
                
                setInterval(() => {
                  totalSeconds += 10;
                  sendEvent('heartbeat', { seconds: 10, scrollPercent: maxScroll });
                }, 10000);
              })();
            <\/script>
          `;

                width: 0 !important;
                height: 0 !important;
              }
